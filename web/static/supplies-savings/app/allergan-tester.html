<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplies — Allergan</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F0E8;
    --warm-white: #FAF8F4;
    --ink: #1C1A16;
    --ink-soft: #4A4640;
    --ink-muted: #8C8680;
    --sage: #7A9E87;
    --sage-light: #E8F0EA;
    --terracotta: #C4644A;
    --terracotta-light: #F5EAE6;
    --amber: #C8923A;
    --amber-light: #F5EDD8;
    --slate: #5B6B7A;
    --slate-light: #E8EDF0;
    --border: rgba(28,26,22,0.10);
    --shadow: 0 2px 16px rgba(28,26,22,0.07);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  .topbar {
    background: var(--ink); color: var(--cream);
    padding: 0 32px; height: 42px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .back-link { font-size: 12px; color: rgba(250,248,244,0.55); text-decoration: none; transition: color 0.15s; }
  .back-link:hover { color: rgba(250,248,244,0.9); }
  .topbar-title { font-size: 13px; font-weight: 500; color: var(--cream); }
  .vendor-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(122,158,135,0.25); color: var(--sage); font-weight: 500; letter-spacing: 0.5px; }

  .page { max-width: 1100px; margin: 0 auto; padding: 28px 32px; }

  /* ── SEARCH + SELECT ── */
  .search-section { background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; margin-bottom: 24px; }
  .search-label { font-size: 11px; color: var(--ink-muted); font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
  .search-row { display: flex; gap: 10px; }
  .search-input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--cream);
    color: var(--ink); outline: none; transition: border 0.15s;
  }
  .search-input:focus { border-color: var(--sage); }
  .search-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--warm-white); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); z-index: 50;
    max-height: 280px; overflow-y: auto; display: none;
  }
  .search-dropdown.open { display: block; }
  .dropdown-item {
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background 0.1s; display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.focused { background: var(--sage-light); }
  .dropdown-item .medspa-name { flex: 1; font-weight: 400; }
  .dropdown-item .medspa-id { font-size: 11px; color: var(--ink-muted); }
  .dropdown-item .no-tx { font-size: 10px; color: var(--amber); background: var(--amber-light); padding: 1px 6px; border-radius: 5px; }
  .search-wrap { position: relative; flex: 1; }

  /* ── DATE RANGE ── */
  .date-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .preset-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: var(--cream); color: var(--ink-soft);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--sage); color: var(--sage); }
  .preset-btn.active { background: var(--sage); color: white; border-color: var(--sage); }
  .date-sep { color: var(--ink-muted); font-size: 12px; }
  .date-input {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; background: var(--cream);
    color: var(--ink); outline: none;
  }
  .date-input:focus { border-color: var(--sage); }

  /* ── RESULTS ── */
  .results-section { display: none; }
  .results-section.visible { display: block; }

  .medspa-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
  .medspa-header-name { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400; color: var(--ink); }
  .medspa-header-id { font-size: 13px; color: var(--ink-muted); }
  .allergan-id-tag { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: var(--slate-light); color: var(--slate); font-weight: 500; }

  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .kpi-label { font-size: 10px; color: var(--ink-muted); font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
  .kpi-value { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 300; color: var(--ink); }
  .kpi-value.sage { color: var(--sage); }
  .kpi-value.amber { color: var(--amber); }
  .kpi-sub { font-size: 11px; color: var(--ink-muted); margin-top: 4px; }

  .breakdown-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .breakdown-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .breakdown-title { font-size: 12px; font-weight: 500; color: var(--ink-soft); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .breakdown-line { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .breakdown-line .b-label { color: var(--ink-soft); }
  .breakdown-line .b-value { font-weight: 500; color: var(--ink); }
  .breakdown-line .b-value.green { color: var(--sage); }

  /* ── TRANSACTION TABLE ── */
  .tx-section { background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .tx-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .tx-header-title { font-size: 13px; font-weight: 500; color: var(--ink); }
  .tx-toggle { font-size: 12px; color: var(--sage); cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; font-weight: 500; padding: 4px 10px; border-radius: 6px; transition: background 0.15s; }
  .tx-toggle:hover { background: var(--sage-light); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--cream); }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--ink-soft); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--cream); }
  td.mono { font-family: monospace; font-size: 11px; }
  .type-badge { font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 500; }
  .type-botox { background: var(--slate-light); color: var(--slate); }
  .type-filler { background: var(--sage-light); color: var(--sage); }
  .type-other { background: var(--cream); color: var(--ink-muted); border: 1px solid var(--border); }
  .type-promo { background: var(--amber-light); color: var(--amber); }
  .tx-amount { font-weight: 500; color: var(--ink); }
  .tx-amount.credit { color: var(--terracotta); }

  .loading { text-align: center; padding: 60px 20px; color: var(--ink-muted); font-family: 'Fraunces', serif; font-size: 16px; font-style: italic; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-muted); font-family: 'Fraunces', serif; font-size: 15px; font-style: italic; }

  @media (max-width: 768px) {
    .page { padding: 16px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .breakdown-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-link">← Dashboard</a>
    <span class="topbar-title">Supplies</span>
    <span class="vendor-badge">Allergan</span>
  </div>
</div>

<div class="page">

  <!-- SEARCH + DATE -->
  <div class="search-section">
    <div class="search-label">Medspa</div>
    <div class="search-row">
      <div class="search-wrap">
        <input class="search-input" id="search-input" type="text" placeholder="Search by medspa name or Moxie ID…" autocomplete="off" />
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
    </div>
    <div class="date-row">
      <button class="preset-btn active" onclick="setPreset('all',this)">All time</button>
      <button class="preset-btn" onclick="setPreset('ytd',this)">YTD</button>
      <button class="preset-btn" onclick="setPreset('12m',this)">Last 12M</button>
      <button class="preset-btn" onclick="setPreset('3m',this)">Last 3M</button>
      <button class="preset-btn" onclick="setPreset('1m',this)">Last month</button>
      <span class="date-sep">or</span>
      <input class="date-input" id="date-start" type="date" onchange="setCustomDate()" />
      <span class="date-sep">→</span>
      <input class="date-input" id="date-end" type="date" onchange="setCustomDate()" />
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-section" id="results">
    <div class="medspa-header">
      <div class="medspa-header-name" id="res-name"></div>
      <div class="medspa-header-id" id="res-moxie-id"></div>
      <div class="allergan-id-tag" id="res-allergan-id"></div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Spend</div>
        <div class="kpi-value" id="kpi-spend">—</div>
        <div class="kpi-sub" id="kpi-spend-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Savings</div>
        <div class="kpi-value sage" id="kpi-savings">—</div>
        <div class="kpi-sub" id="kpi-savings-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Savings Rate</div>
        <div class="kpi-value amber" id="kpi-rate">—</div>
        <div class="kpi-sub" id="kpi-rate-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Transactions</div>
        <div class="kpi-value" id="kpi-rows">—</div>
        <div class="kpi-sub" id="kpi-rows-sub"></div>
      </div>
    </div>

    <div class="breakdown-row">
      <div class="breakdown-card">
        <div class="breakdown-title">Botox</div>
        <div id="breakdown-botox"></div>
      </div>
      <div class="breakdown-card">
        <div class="breakdown-title">Fillers (Juvederm / SkinVive)</div>
        <div id="breakdown-fillers"></div>
      </div>
      <div class="breakdown-card">
        <div class="breakdown-title">Other (SkinMedica / Latisse / etc.)</div>
        <div id="breakdown-other"></div>
      </div>
    </div>

    <div class="tx-section">
      <div class="tx-header">
        <div class="tx-header-title">Transactions <span id="tx-count-label" style="color:var(--ink-muted);font-weight:300;"></span></div>
        <button class="tx-toggle" id="tx-toggle" onclick="togglePromo()">Show promo rows</button>
      </div>
      <div id="tx-table-wrap">
        <div class="loading">Loading…</div>
      </div>
    </div>
  </div>

  <div id="empty-prompt" class="empty-state" style="margin-top:60px;">
    Search for a medspa above to see their Allergan spend and savings.
  </div>

</div>

<script type="module">
// ── Calc library (inline — mirrors lib/calc/allergan.js) ──────────────────
const ERA2_START = '2024-03-01';
const ERA3_START = '2024-08-27';
const BOTOX_MOXIE = { '100': 656.0, '50': 362.0, '200': 1312.0 };

const FILLER_PRICES = {
  era1: {
    'JUVEDERM ULTRA PLUS XC 1 ML , 2SYR':   { list: 755, moxie: 551.42 },
    'JUVEDERM ULTRA XC 0.55 ML, 2SYR':      { list: 621, moxie: 453.46 },
    'JUVEDERM ULTRA XC 1 ML, 2SYR':         { list: 755, moxie: 551.42 },
    'JUVEDERM VOLBELLA XC 0.55 ML, 2SYR':   { list: 420, moxie: 356.70 },
    'JUVEDERM VOLBELLA XC 1 ML, 2SYR':      { list: 770, moxie: 654.24 },
    'JUVEDERM VOLLURE XC 1 ML, 2SYR':       { list: 770, moxie: 654.24 },
    'JUVEDERM VOLUMA XC 1 ML, 2SYR':        { list: 853, moxie: 724.71 },
    'JUVEDERM VOLUX XC 2 X 1ML':            { list: 880, moxie: 748.20 },
    'SKINVIVE BY JUVEDERM 2X1 ML':          { list: 380, moxie: 368.60 },
    '25G CANNULA/23G NEEDLE KIT 10X10':     { list: 74,  moxie: 62.64  },
    '25G CANNULA/23G NEEDLE KIT 4X4':       { list: 35,  moxie: 29.58  },
  },
  era2: {
    'JUVEDERM ULTRA PLUS XC 1 ML , 2SYR':   { list: 781, moxie: 523.50 },
    'JUVEDERM ULTRA XC 0.55 ML, 2SYR':      { list: 643, moxie: 430.50 },
    'JUVEDERM ULTRA XC 1 ML, 2SYR':         { list: 781, moxie: 523.50 },
    'JUVEDERM VOLBELLA XC 0.55 ML, 2SYR':   { list: 431, moxie: 332.10 },
    'JUVEDERM VOLBELLA XC 1 ML, 2SYR':      { list: 791, moxie: 609.12 },
    'JUVEDERM VOLLURE XC 1 ML, 2SYR':       { list: 791, moxie: 609.12 },
    'JUVEDERM VOLUMA XC 1 ML, 2SYR':        { list: 876, moxie: 674.73 },
    'JUVEDERM VOLUX XC 2 X 1ML':            { list: 905, moxie: 696.60 },
    'SKINVIVE BY JUVEDERM 2X1 ML':          { list: 380, moxie: 368.60 },
    '25G CANNULA/23G NEEDLE KIT 10X10':     { list: 76,  moxie: 58.32  },
    '25G CANNULA/23G NEEDLE KIT 4X4':       { list: 36,  moxie: 27.54  },
  },
  era3: {
    'JUVEDERM ULTRA PLUS XC 1 ML , 2SYR':   { list: 698, moxie: 418.80 },
    'JUVEDERM ULTRA XC 0.55 ML, 2SYR':      { list: 574, moxie: 344.40 },
    'JUVEDERM ULTRA XC 1 ML, 2SYR':         { list: 698, moxie: 418.80 },
    'JUVEDERM VOLBELLA XC 0.55 ML, 2SYR':   { list: 410, moxie: 266.50 },
    'JUVEDERM VOLBELLA XC 1 ML, 2SYR':      { list: 752, moxie: 488.80 },
    'JUVEDERM VOLLURE XC 1 ML, 2SYR':       { list: 752, moxie: 488.80 },
    'JUVEDERM VOLUMA XC 1 ML, 2SYR':        { list: 833, moxie: 541.45 },
    'JUVEDERM VOLUX XC 2 X 1ML':            { list: 860, moxie: 559.00 },
    'SKINVIVE BY JUVEDERM 2X1 ML':          { list: 380, moxie: 368.60 },
    '25G CANNULA/23G NEEDLE KIT 10X10':     { list: 72,  moxie: 46.80  },
    '25G CANNULA/23G NEEDLE KIT 4X4':       { list: 34,  moxie: 22.10  },
    '27G CANNULA / 25G NEEDLE KIT 10X10':   { list: 72,  moxie: 46.80  },
    '27G CANNULA / 25G NEEDLE KIT 4X4':     { list: 34,  moxie: 22.10  },
  },
};

function normId(id) { return String(id ?? '').trim().split('.')[0]; }
function normDesc(d) { return (d || '').toUpperCase().trim().replace(/\s+/g, ' '); }
function round2(n) { return Math.round(n * 100) / 100; }
function fmt$(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtPct(n) { return (n * 100).toFixed(1) + '%'; }

function getEra(d) {
  if (d >= ERA3_START) return 'era3';
  if (d >= ERA2_START) return 'era2';
  return 'era1';
}
function getBotoxUnit(d) {
  if (d.includes('200')) return '200';
  if (d.includes('100')) return '100';
  if (d.includes('50'))  return '50';
  return null;
}
function classifyRow(dn) {
  if (dn.includes('BOTOX')) return 'botox';
  const era = 'era1'; // just for key check
  if (Object.keys(FILLER_PRICES.era1).some(k => dn === k) ||
      Object.keys(FILLER_PRICES.era2).some(k => dn === k) ||
      Object.keys(FILLER_PRICES.era3).some(k => dn === k)) return 'filler';
  return 'other';
}

function calcAllerganDetail(rows, allerganId, filter = {}) {
  const target = normId(allerganId);
  const result = { spend: 0, savings: 0, rows: 0, promo: 0,
    botox: { spend: 0, rows: 0 },
    fillers: { spend: 0, savings: 0, rows: 0 },
    other: { spend: 0, rows: 0 },
    txRows: []
  };

  for (const r of rows) {
    if (normId(r['Sold-to #']) !== target) continue;
    const amt = parseFloat(r['Amount']) || 0;
    const qty = parseFloat(r['Quantity']) || 0;
    const desc = r['Description'] ?? '';
    const date = r['DATE'] ?? '';
    const dn = normDesc(desc);
    const era = getEra(date);
    const type = classifyRow(dn);
    const isPromo = (amt === 0 && qty > 0);

    if (filter.startDate && date < filter.startDate) continue;
    if (filter.endDate   && date > filter.endDate)   continue;

    const txRow = { date, desc, amt, qty, era, type, isPromo, spend: 0, savings: 0 };

    if (isPromo) {
      result.promo++;
      txRow.type = 'promo';
      result.txRows.push(txRow);
      continue;
    }

    result.rows++;

    if (type === 'botox') {
      let rowSpend;
      if (era === 'era1') { rowSpend = amt; }
      else { const unit = getBotoxUnit(dn); rowSpend = qty * (BOTOX_MOXIE[unit] ?? 656.0); }
      result.spend += rowSpend;
      result.botox.spend += rowSpend;
      result.botox.rows++;
      txRow.spend = rowSpend;
    } else if (FILLER_PRICES[era]?.[dn]) {
      const p = FILLER_PRICES[era][dn];
      let rowSpend, rowSavings;
      if (era === 'era1') { rowSpend = amt; rowSavings = qty * (p.list - p.moxie); }
      else { rowSpend = qty * p.moxie; rowSavings = qty * (p.list - p.moxie); }
      result.spend += rowSpend;
      result.savings += rowSavings;
      result.fillers.spend += rowSpend;
      result.fillers.savings += rowSavings;
      result.fillers.rows++;
      txRow.spend = rowSpend; txRow.savings = rowSavings;
    } else {
      result.spend += amt;
      result.other.spend += amt;
      result.other.rows++;
      txRow.spend = amt;
    }

    result.txRows.push(txRow);
  }

  result.spend = round2(result.spend);
  result.savings = round2(result.savings);
  result.fillers.spend = round2(result.fillers.spend);
  result.fillers.savings = round2(result.fillers.savings);
  result.botox.spend = round2(result.botox.spend);
  result.other.spend = round2(result.other.spend);
  result.txRows.sort((a, b) => b.date.localeCompare(a.date));
  return result;
}

// ── App state ─────────────────────────────────────────────────────────────
let txRows = null;
let medspas = _MEDSPAS;
let selectedMedspa = null;
let filter = {};
let showPromo = false;
let focusIdx = -1;
let dropdownItems = [];

async function loadEmbedded() {
  // Decompress the base64 gzip data
  const binary = atob(_ALLERGAN_B64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes); writer.close();
  const reader = ds.readable.getReader();
  const chunks = [];
  let done = false;
  while (!done) { const r = await reader.read(); done = r.done; if (r.value) chunks.push(r.value); }
  const total = chunks.reduce((a, c) => a + c.length, 0);
  const merged = new Uint8Array(total);
  let offset = 0;
  for (const c of chunks) { merged.set(c, offset); offset += c.length; }
  const slim = JSON.parse(new TextDecoder().decode(merged));
  // Expand slim rows back to full field names
  return slim.map(r => ({
    'Sold-to #': r.s, 'DATE': r.d, 'Amount': r.a, 'Quantity': r.q, 'Description': r.n
  }));
}

async function init() {
  [txRows, medspas] = await Promise.all([loadEmbedded(), Promise.resolve(_MEDSPAS)]);
}


init().catch(console.error);

// ── Search ────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const dropdown    = document.getElementById('search-dropdown');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { dropdown.classList.remove('open'); return; }

  const matches = medspas.filter(m =>
    m.name.toLowerCase().includes(q) ||
    String(m.id).includes(q) ||
    m.allergan_id.includes(q)
  ).slice(0, 30);

  dropdownItems = matches;
  focusIdx = -1;

  if (!matches.length) { dropdown.innerHTML = '<div class="dropdown-item" style="color:var(--ink-muted)">No results</div>'; dropdown.classList.add('open'); return; }

  dropdown.innerHTML = matches.map((m, i) => `
    <div class="dropdown-item" data-idx="${i}">
      <span class="medspa-name">${m.name}</span>
      <span class="medspa-id">ID ${m.id}</span>
      ${!m.has_tx ? '<span class="no-tx">no tx data</span>' : ''}
    </div>
  `).join('');
  dropdown.classList.add('open');

  dropdown.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('click', () => selectMedspa(dropdownItems[+el.dataset.idx]));
  });
});

searchInput.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.dropdown-item[data-idx]');
  if (e.key === 'ArrowDown') { e.preventDefault(); focusIdx = Math.min(focusIdx + 1, items.length - 1); updateFocus(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); focusIdx = Math.max(focusIdx - 1, 0); updateFocus(items); }
  else if (e.key === 'Enter' && focusIdx >= 0 && dropdownItems[focusIdx]) { selectMedspa(dropdownItems[focusIdx]); }
  else if (e.key === 'Escape') { dropdown.classList.remove('open'); }
});

function updateFocus(items) {
  items.forEach((el, i) => el.classList.toggle('focused', i === focusIdx));
  if (focusIdx >= 0 && items[focusIdx]) items[focusIdx].scrollIntoView({ block: 'nearest' });
}

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open'); });

function selectMedspa(m) {
  selectedMedspa = m;
  searchInput.value = m.name + (m.id ? ` (${m.id})` : '');
  dropdown.classList.remove('open');
  compute();
}

// ── Date presets ──────────────────────────────────────────────────────────
window.setPreset = function(preset, btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const today = new Date();
  const pad = n => String(n).padStart(2, '0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  document.getElementById('date-start').value = '';
  document.getElementById('date-end').value = '';

  if (preset === 'all') { filter = {}; }
  else if (preset === 'ytd') { filter = { startDate: `${today.getFullYear()}-01-01`, endDate: fmt(today) }; }
  else if (preset === '12m') {
    const s = new Date(today); s.setFullYear(s.getFullYear() - 1);
    filter = { startDate: fmt(s), endDate: fmt(today) };
  } else if (preset === '3m') {
    const s = new Date(today); s.setMonth(s.getMonth() - 3);
    filter = { startDate: fmt(s), endDate: fmt(today) };
  } else if (preset === '1m') {
    const first = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const last  = new Date(today.getFullYear(), today.getMonth(), 0);
    filter = { startDate: fmt(first), endDate: fmt(last) };
  }
  compute();
};

window.setCustomDate = function() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  const s = document.getElementById('date-start').value;
  const e = document.getElementById('date-end').value;
  filter = {};
  if (s) filter.startDate = s;
  if (e) filter.endDate = e;
  compute();
};

// ── Compute + render ──────────────────────────────────────────────────────
function compute() {
  if (!selectedMedspa || !txRows) return;
  const r = calcAllerganDetail(txRows, selectedMedspa.allergan_id, filter);
  renderResults(r);
}

function renderResults(r) {
  document.getElementById('empty-prompt').style.display = 'none';
  document.getElementById('results').classList.add('visible');

  document.getElementById('res-name').textContent = selectedMedspa.name;
  document.getElementById('res-moxie-id').textContent = `Moxie ID ${selectedMedspa.id}`;
  document.getElementById('res-allergan-id').textContent = `Allergan Sold-to # ${selectedMedspa.allergan_id}`;

  const rate = r.spend > 0 ? r.savings / r.spend : 0;
  document.getElementById('kpi-spend').textContent = fmt$(r.spend);
  document.getElementById('kpi-spend-sub').textContent = `${r.rows} transactions`;
  document.getElementById('kpi-savings').textContent = fmt$(r.savings);
  document.getElementById('kpi-savings-sub').textContent = r.spend > 0 ? `on fillers only` : '';
  document.getElementById('kpi-rate').textContent = fmtPct(rate);
  document.getElementById('kpi-rate-sub').textContent = r.promo > 0 ? `${r.promo} promo rows excluded` : '';
  document.getElementById('kpi-rows').textContent = r.rows + r.promo;
  document.getElementById('kpi-rows-sub').textContent = `${r.rows} paid, ${r.promo} promo`;

  // Breakdowns
  document.getElementById('breakdown-botox').innerHTML = r.botox.rows ? `
    <div class="breakdown-line"><span class="b-label">Spend</span><span class="b-value">${fmt$(r.botox.spend)}</span></div>
    <div class="breakdown-line"><span class="b-label">Rows</span><span class="b-value">${r.botox.rows}</span></div>
    <div class="breakdown-line"><span class="b-label">Savings</span><span class="b-value">$0 (per spec)</span></div>
  ` : '<div style="color:var(--ink-muted);font-size:12px;padding:4px 0">No Botox transactions</div>';

  document.getElementById('breakdown-fillers').innerHTML = r.fillers.rows ? `
    <div class="breakdown-line"><span class="b-label">Spend</span><span class="b-value">${fmt$(r.fillers.spend)}</span></div>
    <div class="breakdown-line"><span class="b-label">Savings</span><span class="b-value green">${fmt$(r.fillers.savings)}</span></div>
    <div class="breakdown-line"><span class="b-label">Rows</span><span class="b-value">${r.fillers.rows}</span></div>
  ` : '<div style="color:var(--ink-muted);font-size:12px;padding:4px 0">No filler transactions</div>';

  document.getElementById('breakdown-other').innerHTML = r.other.rows ? `
    <div class="breakdown-line"><span class="b-label">Spend</span><span class="b-value">${fmt$(r.other.spend)}</span></div>
    <div class="breakdown-line"><span class="b-label">Rows</span><span class="b-value">${r.other.rows}</span></div>
    <div class="breakdown-line"><span class="b-label">Savings</span><span class="b-value">$0 (no price table)</span></div>
  ` : '<div style="color:var(--ink-muted);font-size:12px;padding:4px 0">No other transactions</div>';

  renderTable(r.txRows);
}

function renderTable(rows) {
  const visible = showPromo ? rows : rows.filter(r => r.type !== 'promo');
  const toggle = document.getElementById('tx-toggle');
  toggle.textContent = showPromo ? 'Hide promo rows' : 'Show promo rows';
  document.getElementById('tx-count-label').textContent = `(${visible.length} shown)`;

  if (!visible.length) {
    document.getElementById('tx-table-wrap').innerHTML = '<div class="empty-state">No transactions in this date range.</div>';
    return;
  }

  const typeLabel = { botox: 'Botox', filler: 'Filler', other: 'Other', promo: 'Promo' };

  document.getElementById('tx-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Date</th><th>Description</th><th>Era</th><th>Type</th><th>Qty</th>
        <th style="text-align:right">Amount</th><th style="text-align:right">Spend</th><th style="text-align:right">Savings</th>
      </tr></thead>
      <tbody>
        ${visible.map(r => `<tr>
          <td class="mono">${r.date}</td>
          <td style="max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${r.desc}">${r.desc}</td>
          <td><span style="font-size:11px;color:var(--ink-muted)">${r.era}</span></td>
          <td><span class="type-badge type-${r.type}">${typeLabel[r.type] || r.type}</span></td>
          <td style="text-align:center">${r.qty || ''}</td>
          <td class="tx-amount${r.amt < 0 ? ' credit' : ''}" style="text-align:right">${fmt$(r.amt)}</td>
          <td style="text-align:right;font-weight:500">${r.type !== 'promo' ? fmt$(r.spend) : '—'}</td>
          <td style="text-align:right;color:var(--sage)">${r.savings ? fmt$(r.savings) : '—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
}

window.togglePromo = function() { showPromo = !showPromo; if (selectedMedspa && txRows) compute(); };
</script>
</body>
</html>

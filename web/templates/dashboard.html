{% extends "layout.html" %}
{% block title %}MBR Generator — Dashboard{% endblock %}

{% block content %}
<div class="container">
  <div class="hero">
    <h1>Generate a Monthly Business Review</h1>
    <p>Select a practice, choose the reporting period, and generate a polished MBR report.</p>
  </div>

  <div class="card generate-card">
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label for="practice">Practice Name or Medspa ID</label>
        <input type="text" id="practice" placeholder="Start typing a name or enter a medspa ID..."
               autocomplete="off" list="practice-list">
        <datalist id="practice-list"></datalist>
      </div>
      <div class="form-group">
        <label for="month">Month</label>
        <select id="month">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>
      <div class="form-group">
        <label for="year">Year</label>
        <select id="year">
          <option value="2026" selected>2026</option>
          <option value="2025">2025</option>
        </select>
      </div>
    </div>

    <button id="generate-btn" class="btn btn-primary btn-lg" onclick="generateReport()">
      Generate Report
    </button>

    <div id="status" class="status hidden">
      <div class="spinner"></div>
      <span id="status-text">Loading data from Omni...</span>
    </div>

    <div id="error" class="error-msg hidden"></div>
  </div>

  <div class="recent-section" id="recent-section" style="display:none">
    <h3>Recent Reports</h3>
    <div id="recent-list"></div>
  </div>
</div>

<script>
// Load practices for autocomplete (name + ID)
let allPractices = [];
fetch('/api/practices')
  .then(r => r.json())
  .then(data => {
    allPractices = data.practices || [];
    const dl = document.getElementById('practice-list');
    allPractices.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.label = p.id ? p.name + ' (ID: ' + p.id + ')' : p.name;
      dl.appendChild(opt);
    });
  })
  .catch(() => {});

function resolvePractice(input) {
  // If input is a number, look up by medspa ID
  if (/^\d+$/.test(input)) {
    const match = allPractices.find(p => p.id === parseInt(input));
    return match ? match.name : null;
  }
  return input;
}

function generateReport() {
  const rawInput = document.getElementById('practice').value.trim();
  const month = document.getElementById('month').value;
  const year = document.getElementById('year').value;

  if (!rawInput) {
    showError('Please enter a practice name or medspa ID.');
    return;
  }

  const practice = resolvePractice(rawInput);
  if (!practice) {
    showError('Medspa ID ' + rawInput + ' not found. Make sure the ID is correct.');
    return;
  }

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  document.getElementById('status').classList.remove('hidden');
  document.getElementById('error').classList.add('hidden');
  document.getElementById('status-text').textContent = 'Loading data from Omni...';

  fetch('/api/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({practice, month: parseInt(month), year: parseInt(year)})
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    btn.textContent = 'Generate Report';
    document.getElementById('status').classList.add('hidden');

    if (data.error) {
      showError(data.error);
    } else {
      window.location.href = '/editor/' + data.session_id;
    }
  })
  .catch(err => {
    btn.disabled = false;
    btn.textContent = 'Generate Report';
    document.getElementById('status').classList.add('hidden');
    showError('Connection error: ' + err.message);
  });
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// Enter key triggers generate
document.getElementById('practice').addEventListener('keypress', e => {
  if (e.key === 'Enter') generateReport();
});


</script>
{% endblock %}
